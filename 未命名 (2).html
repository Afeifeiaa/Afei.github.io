            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin: 40px 0;
        }

        .tarot-card {
            width: 170px;
            height: 290px;
            perspective: 1200px;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.9s ease;
            transform-style: preserve-3d;
            border-radius: 14px;
        }

        .tarot-card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.7);
            overflow: hidden;
        }

        .card-back {
            background: #141422;
            background-image: linear-gradient(145deg, #23203a, #111120);
            color: #c9a850;
            font-size: 20px;
            font-weight: bold;
            border: 3px solid #2a283d;
        }

        .card-front {
            transform: rotateY(180deg);
            background: #000;
            border: 2px solid #3a3855;
        }

        .tarot-card.reversed .card-inner {
            transform: rotateY(180deg) rotate(180deg);
        }

        .loading {
            color: #d4b866;
            margin: 20px 0;
            font-size: 17px;
        }

        .result {
            background: rgba(20, 20, 35, 0.85);
            padding: 30px;
            border-radius: 16px;
            text-align: left;
            line-height: 1.8;
            font-size: 16px;
            margin-top: 20px;
            white-space: pre-line;
            border: 1px solid #333;
            color: #e0d8c0;
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;

            { name: "宝剑国王", img: "https://img.qqzhi.com/uploads/2025-03-27/77889900aabbccddeeff112233445566.jpg", up: "理智、公正、决断、权威。", rev: "冷酷、固执、偏激、专制。" },

            { name: "星币五", img: "https://img.qqzhi.com/uploads/2025-03-27/bbccddeeff11223344556677889900aa.jpg", up: "贫困、失落、孤独、困境。", rev: "好转、帮助、走出低谷。" },

            { name: "星币骑士", img: "https://img.qqzhi.com/uploads/2025-03-27/3344556677889900aabbccddeeff1122.jpg", up: "踏实、勤奋、耐心、稳步前行。", rev: "固执、懒惰、拖延、不思进取。" },

            { name: "星币国王", img: "https://img.qqzhi.com/uploads/2025-03-27/556677889900aabbccddeeff11223344.jpg", up: "成功、财富、稳重、成熟。", rev: "固执、吝啬、物质、僵化。" }
        ];

        let selectedCards = [];

        function drawOne() { drawCards(1); }
        function drawThree() { drawCards(3); }

        function drawCards(count) {
            document.getElementById("result").innerText = "";
            document.getElementById("loading").innerText = "🖤 洗牌中...";
            selectedCards = [];

            let list = [...tarotCards];
            for (let i = 0; i < count; i++) {
                let idx = Math.floor(Math.random() * list.length);
                let card = list[idx];
                card.reversed = Math.random() > 0.5;
                selectedCards.push(card);
                list.splice(idx, 1);
            }

            renderCards();
            setTimeout(() => flipAll(), 1000);
        }

        function renderCards() {
            let area = document.getElementById("cardArea");
            area.innerHTML = "";
            selectedCards.forEach(card => {
                let div = document.createElement("div");
                div.className = "tarot-card";
                if (card.reversed) div.classList.add("reversed");

                div.innerHTML = `
                <div class="card-inner">
                    <div class="card-back">韦特塔罗</div>
                    <div class="card-front">
                        <img src="${card.img}" class="card-img">
                    </div>
                </div>`;
                area.appendChild(div);
            });
        }

        function flipAll() {
            document.querySelectorAll(".tarot-card").forEach(c => c.classList.add("flipped"));
            setTimeout(showReading, 1300);
        }

        function showReading() {
            const loading = document.getElementById("loading");
            const result = document.getElementById("result");
            loading.innerText = "🔮 暗黑解读中...";

            let text = "【暗黑韦特 · 完整解读】\n\n";

            if (selectedCards.length === 3) {
                text += "◆ 过去：" + (selectedCards[0].reversed ? selectedCards[0].rev : selectedCards[0].up) + "\n\n";
                text += "◆ 现在：" + (selectedCards[1].reversed ? selectedCards[1].rev : selectedCards[1].up) + "\n\n";
                text += "◆ 未来：" + (selectedCards[2].reversed ? selectedCards[2].rev : selectedCards[2].up) + "\n\n";
                text += "暗影箴言：接受黑暗，方能看见真正的光。";
            } else {
                let card = selectedCards[0];
                text += `${card.name}（${card.reversed ? "逆位" : "正位"}）\n\n`;
                text += (card.reversed ? card.rev : card.up) + "\n\n";
                text += "暗影箴言：恐惧是幻象，真相藏于牌面之中。";
            }

            result.innerText = text;
            loading.innerText = "";
        }
    </script>
</body>
